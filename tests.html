<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Litaval — pure-logic tests</title>
<style>
  body{font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace; margin:24px; color:#1c1b19; background:#faf9f5}
  h1{font-size:18px} #summary{font-size:16px; font-weight:700; padding:8px 12px; border-radius:8px; display:inline-block}
  .ok{background:#dcefdc; color:#1f5130} .bad{background:#f3d6d2; color:#7a2018}
  ul{list-style:none; padding:0} li{padding:2px 0} li.f{color:#7a2018} li.p{color:#3a7a4a}
  code{background:#efece4; padding:1px 4px; border-radius:4px}
</style>
</head>
<body>
<h1>Litaval — pure-logic tests</h1>
<p>Zero-dependency harness. Loads <code>colors.js</code> + <code>app.js</code> behind a test flag and
asserts the pure helpers. No framework. Open this file via the same server as the app.</p>
<p id="summary">running…</p>
<ul id="out"></ul>

<script>
  window.__LITAVAL_TEST__ = true;
  // a top-level guard: whatever happens, the summary must never stay stuck on "running…"
  window.addEventListener('error', e => {
    const s = document.getElementById('summary');
    if (s && s.textContent === 'running…') { s.textContent = 'FAILED: ' + e.message; s.className = 'bad'; }
  });
</script>
<script src="colors.js?v=21"></script>
<script src="app.js?v=21"></script>
<script>
(() => {
  const T = window.__LITAVAL_TEST__;
  const out = document.getElementById('out');
  const summary = document.getElementById('summary');
  let pass = 0, fail = 0;
  const rec = (name, ok, detail) => {
    (ok ? pass++ : fail++);
    const li = document.createElement('li');
    li.className = ok ? 'p' : 'f';
    li.textContent = `${ok ? '✓' : '✗'} ${name}${ok ? '' : ' — ' + detail}`;
    out.appendChild(li);
  };
  // every test is a thunk; a throw inside it is recorded as a failure, never halting the run
  const test = (name, fn) => { try { fn(); rec(name, true, ''); } catch (e) { rec(name, false, e.message || String(e)); } };
  const aeq = (got, want) => { if (JSON.stringify(got) !== JSON.stringify(want)) throw new Error(`got ${JSON.stringify(got)}, want ${JSON.stringify(want)}`); };
  const at  = (cond, detail='assertion false') => { if (!cond) throw new Error(detail); };

  try {
    if (!T || !T.norm) throw new Error('test export not present (is window.__LITAVAL_TEST__ set before app.js?)');

    // --- norm ---
    test('norm(-30)=330', () => aeq(T.norm(-30), 330));
    test('norm(360)=0',  () => aeq(T.norm(360), 0));
    test('norm(370)=10', () => aeq(T.norm(370), 10));
    test('norm(-390)=330', () => aeq(T.norm(-390), 330));

    // --- hueDist ---
    test('hueDist(10,350)=20', () => aeq(T.hueDist(10,350), 20));
    test('hueDist(0,180)=180', () => aeq(T.hueDist(0,180), 180));
    test('hueDist(350,10)=20', () => aeq(T.hueDist(350,10), 20));
    test('hueDist symmetric',  () => at(T.hueDist(33,200) === T.hueDist(200,33)));

    // --- clamp ---
    test('clamp mid',  () => aeq(T.clamp(5,0,10), 5));
    test('clamp low',  () => aeq(T.clamp(-3,0,10), 0));
    test('clamp high', () => aeq(T.clamp(99,0,10), 10));

    // --- hueBand / isWarmHue / tempOf ---
    test('hueBand(15) orange row',  () => aeq(T.hueBand(15).moods, ['enthusiasm','sociability','warmth']));
    test('hueBand(344) magenta row',() => aeq(T.hueBand(344).moods, ['creativity','sensitivity','playfulness']));
    test('hueBand(345) red row',    () => aeq(T.hueBand(345).moods, ['passion','warmth','energy']));
    test('hueBand(NaN) empty',      () => aeq(T.hueBand(NaN).moods, []));
    test('isWarmHue(69) warm',  () => at(T.isWarmHue(69) === true));
    test('isWarmHue(70) cool',  () => at(T.isWarmHue(70) === false));
    test('isWarmHue(289) cool', () => at(T.isWarmHue(289) === false));
    test('isWarmHue(290) warm', () => at(T.isWarmHue(290) === true));
    test('tempOf neutral', () => aeq(T.tempOf({h:0,s:5,l:50}), 'neutral'));
    test('tempOf warm',    () => aeq(T.tempOf({h:30,s:60,l:50}), 'warm'));
    test('tempOf cool',    () => aeq(T.tempOf({h:200,s:60,l:50}), 'cool'));

    // --- roleName ---
    test('roleName(180)=Complement',    () => aeq(T.roleName(180), 'Complement'));
    test('roleName(-30)=Neighbour',     () => aeq(T.roleName(-30), 'Neighbour'));
    test('roleName(210)=Split partner', () => aeq(T.roleName(210), 'Split partner'));
    test('roleName(240)=Triad partner', () => aeq(T.roleName(240), 'Triad partner'));
    test('roleName(90)=Partner',        () => aeq(T.roleName(90), 'Partner'));

    // --- driftTier thresholds ---
    test('driftTier(7)=textbook',        () => aeq(T.driftTier(7).label, 'textbook'));
    test('driftTier(8)=close',           () => aeq(T.driftTier(8).label, 'close'));
    test('driftTier(17)=close',          () => aeq(T.driftTier(17).label, 'close'));
    test('driftTier(18)=loose',          () => aeq(T.driftTier(18).label, 'loose'));
    test('driftTier(31)=loose',          () => aeq(T.driftTier(31).label, 'loose'));
    test('driftTier(32)=unconventional', () => aeq(T.driftTier(32).label, 'unconventional'));

    // --- classifyScheme ---
    const C = (...hs) => hs.map(h => ({h, s:60, l:50}));
    test('classify [0,180] complementary', () => aeq(T.classifyScheme(C(0,180)).scheme.id, 'complementary'));
    test('classify [0,30] analogous',      () => aeq(T.classifyScheme(C(0,30)).scheme.id, 'analogous'));
    test('classify [200,205] mono',        () => aeq(T.classifyScheme(C(200,205)).scheme.id, 'mono'));
    test('classify [0,120,240] triadic',   () => aeq(T.classifyScheme(C(0,120,240)).scheme.id, 'triadic'));
    test('classify [10,145,215] split',    () => aeq(T.classifyScheme(C(10,145,215)).scheme.id, 'split'));
    test('classify wraparound [350,20] analogous ~0 drift', () => {
      const cl = T.classifyScheme(C(350,20));
      at(cl.scheme.id === 'analogous' && cl.avg < 1, `id=${cl.scheme.id} avg=${cl.avg}`);
    });

    // --- driftReadout (the app's most prominent computed text) ---
    test('driftReadout complementary tail+lines', () => {
      const cl = T.classifyScheme(C(0,180));
      const r = T.driftReadout(cl, C(0,180));
      at(/about 0° off the textbook ideal/.test(r.tail), `tail=${r.tail}`);
      aeq(r.lines.length, 2);
    });
    test('driftReadout mono tail', () => {
      const cols = C(200,205);
      const r = T.driftReadout(T.classifyScheme(cols), cols);
      at(/within \d+° of one hue/.test(r.tail), `tail=${r.tail}`);
    });

    // --- qualifies ---
    const base = {h:0, s:60, l:50, hex:'#base', name:'base', neutral:false};
    const axHue = {valueOnly:false, centerHue:0, hueLimit:30, minBase:0};
    const mk = (h,l,extra={}) => ({h, l, s:60, hex:'#'+h+'-'+l, name:'c'+h+l, neutral:false, ...extra});
    test('qualifies within hueLimit',     () => at(T.qualifies(mk(20,50), axHue, base, new Set(), null) === true));
    test('qualifies outside hueLimit',    () => at(T.qualifies(mk(50,50), axHue, base, new Set(), null) === false));
    test('qualifies too light (hue path)',() => at(T.qualifies(mk(10,95), axHue, base, new Set(), null) === false));
    test('qualifies too dark (hue path)', () => at(T.qualifies(mk(10,5),  axHue, base, new Set(), null) === false));
    test('qualifies neutral rejected',    () => at(T.qualifies(mk(10,50,{neutral:true}), axHue, base, new Set(), null) === false));
    test('qualifies used-elsewhere',      () => at(T.qualifies({...mk(10,50), hex:'#dup'}, axHue, base, new Set(['#dup']), null) === false));
    const axDir = {valueOnly:true, centerHue:0, hueLimit:20, dir:1};
    test('qualifies dir+1 lighter passes',() => at(T.qualifies(mk(2,60), axDir, base, new Set(), null) === true));
    test('qualifies dir+1 darker rejected',()=> at(T.qualifies(mk(2,40), axDir, base, new Set(), null) === false));
    // intended asymmetry: the valueOnly (mono) path deliberately skips the l<12/l>90 extremes guard
    test('qualifies valueOnly ignores l-extremes', () => at(T.qualifies(mk(2,95), axDir, base, new Set(), null) === true));

    // --- paletteNarrative ---
    test('narrative <2 colours -> []', () => aeq(T.paletteNarrative([{h:0,s:50,l:50}], [1]), []));
    test('narrative even split -> "more saturated"', () => {
      const s = T.paletteNarrative([{h:30,s:80,l:50},{h:210,s:40,l:50}], [0.5,0.5]);
      at(/more saturated/.test(s[0]) && !/largest share/.test(s[0]), s[0]);
    });
    test('narrative names the singled-out colour', () => {
      const s = T.paletteNarrative([{h:30,s:80,l:50,name:'Sunset'},{h:210,s:40,l:50,name:'Slate'}], [0.5,0.5]);
      at(/Sunset/.test(s[0]), s[0]);   // the more-saturated colour is named, not "the most saturated colour"
    });
    test('narrative 70/30 -> "largest share"', () => {
      const s = T.paletteNarrative([{h:30,s:80,l:50},{h:210,s:40,l:50}], [0.7,0.3]);
      at(/largest share/.test(s[0]), s[0]);
    });
    test('narrative contrast: near hues -> one hue', () => {
      const s = T.paletteNarrative([{h:200,s:60,l:50},{h:205,s:60,l:50}], [0.5,0.5]);
      at(/share essentially one hue/.test(s[1]), s[1]);
    });
    test('narrative high sat-range (dominant) names the vivid one', () => {
      const s = T.paletteNarrative([{h:30,s:40,l:50,name:'Ash'},{h:210,s:90,l:50,name:'Cobalt'}], [0.7,0.3]);
      at(/far more saturated/.test(s[2]) && /Cobalt/.test(s[2]), s[2]);
    });
    test('narrative high sat-range (even) avoids re-naming the lead', () => {
      const s = T.paletteNarrative([{h:30,s:90,l:50,name:'Marigold'},{h:210,s:20,l:50,name:'Mist'}], [0.5,0.5]);
      at(/much softer/.test(s[2]) && !/Marigold/.test(s[2]), s[2]);   // named once (sentence 1), not twice
    });
    test('narrative lightness: wide range -> light-to-dark', () => {
      const s = T.paletteNarrative([{h:30,s:60,l:85},{h:210,s:60,l:25}], [0.5,0.5]);
      at(/light-to-dark range/.test(s[3]), s[3]);
    });

    // --- monoTargets ---
    test('monoTargets(20,2) steps up',  () => { const d=T.monoTargets(20,2); aeq([d[0][0],d[0][2]], [50,1]); });
    test('monoTargets(80,2) steps down',() => { const d=T.monoTargets(80,2); aeq([d[0][0],d[0][2]], [50,-1]); });
    test('monoTargets(50,3) lighter+deeper', () => aeq(T.monoTargets(50,3), [[80,'Lighter',1],[20,'Deeper',-1]]));
    test('monoTargets(85,3) clamps lighter to 86', () => aeq(T.monoTargets(85,3)[0][0], 86));

    // --- ratio presets ---
    for (const n of [2,3]) {
      T.RATIO_PRESETS[n].forEach((p,i) => {
        test(`preset ${n}#${i} length=${n}`, () => aeq(p.r.length, n));
        test(`preset ${n}#${i} sums to 1`,  () => at(Math.abs(p.r.reduce((a,b)=>a+b,0) - 1) < 1e-9, `sum=${p.r.reduce((a,b)=>a+b,0)}`));
      });
    }
    test('ratioPresetsFor(2) -> 2-presets', () => at(T.ratioPresetsFor(2) === T.RATIO_PRESETS[2]));
    test('ratioPresetsFor(3) -> 3-presets', () => at(T.ratioPresetsFor(3) === T.RATIO_PRESETS[3]));
    test('ratioPresetsFor(5) -> fallback 2-presets', () => at(T.ratioPresetsFor(5) === T.RATIO_PRESETS[2]));

  } catch (suiteErr) {
    rec('SUITE CRASHED before completing', false, suiteErr.message || String(suiteErr));
  }

  summary.textContent = `${pass} passed, ${fail} failed`;
  summary.className = fail === 0 ? 'ok' : 'bad';
})();
</script>
</body>
</html>
